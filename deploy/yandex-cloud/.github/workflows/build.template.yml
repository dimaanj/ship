name: "Build Template"

on:
  workflow_call:
    inputs:
      service_name:
        type: string
        description: 'Service identifier for container registry (e.g., "api", "web")'
        required: true
      environment:
        type: string
        description: 'Target environment for deployment (staging/production)'
        required: true
      docker_file_path:
        type: string
        description: 'Relative path to the Dockerfile'
        required: true
      docker_context_dir:
        description: 'Directory for Docker build context'
        default: '.'
        required: false
        type: string
      helm_chart_dir:
        type: string
        description: 'Path to Helm chart configuration files'
        required: true

    outputs:
      image_tag:
        value: ${{ jobs.build.outputs.image_tag }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v3

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i /opt/yc -n
          echo "/opt/yc/bin" >> $GITHUB_PATH

      - name: Authenticate with Yandex Cloud
        run: |
          echo '${{ secrets.YC_SA_KEY }}' > sa-key.json
          yc config set service-account-key sa-key.json
          yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}
          rm sa-key.json

      - name: Configure Docker for Yandex Container Registry
        run: yc container registry configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            "cr.yandex/${{ secrets.YC_REGISTRY_ID }}/${{ inputs.service_name }}"
          tags: |
            type=sha,prefix=${{ inputs.environment }}
          flavor: |
            latest=false

      - name: Build service and push image
        uses: docker/build-push-action@v3
        with:
          context: ${{ inputs.docker_context_dir }}
          file: ${{ inputs.docker_file_path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          build-args: |
            APP_ENV=${{ inputs.environment }}

      - name: Create summary
        uses: x-color/github-actions-job-summary@v0.1.0
        with:
          file: ./.github/workflows/template/summary-build.md
          vars: |
            actor:  ${{ github.actor }}
            event_name: ${{ github.event_name }}
            environment: ${{ inputs.environment }}
            image_tag: ${{ steps.meta.outputs.tags }}
